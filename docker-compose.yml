services:

  # 🟡 DATABASE
  db:
    image: ankane/pgvector:v0.5.1
    container_name: attendance_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database.sql:/docker-entrypoint-initdb.d/init.sql

  # 🟣 AI SERVICE
  ai-service:
    build: ./ai-service
    container_name: attendance_ai_service
    restart: always
    volumes:
      - ./ai-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN}
      AI_LIVENESS_MIN_FRAMES: ${AI_LIVENESS_MIN_FRAMES:-4}
      AI_LIVENESS_MIN_POSE_CHANGE: ${AI_LIVENESS_MIN_POSE_CHANGE:-0.06}
      AI_LIVENESS_MIN_QUALITY: ${AI_LIVENESS_MIN_QUALITY:-0.5}
      AI_LIVENESS_SAME_FACE_SIMILARITY: ${AI_LIVENESS_SAME_FACE_SIMILARITY:-0.45}
    ports:
      - "8000:8000"

  # 🔵 BACKEND
  backend:
    build: ./backend
    container_name: attendance_backend
    restart: always
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npx nodemon index.js
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN}
      ATTENDANCE_REQUIRE_LIVENESS: ${ATTENDANCE_REQUIRE_LIVENESS:-true}
      ATTENDANCE_LIVENESS_MIN_FRAMES: ${ATTENDANCE_LIVENESS_MIN_FRAMES:-4}
      ATTENDANCE_LIVENESS_REQUIRED_MOVING_PAIRS: ${ATTENDANCE_LIVENESS_REQUIRED_MOVING_PAIRS:-2}
      ATTENDANCE_LIVENESS_MIN_MOTION_SCORE: ${ATTENDANCE_LIVENESS_MIN_MOTION_SCORE:-5.5}
    ports:
      - "5000:5000"
    depends_on:
      - db
      - ai-service

  # 🟢 FRONTEND
  frontend:
    build: ./frontend
    container_name: attendance_frontend
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
      WATCHPACK_POLLING: true
    ports:
      - "3000:3000"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: tqd0105@gmail.com
      PGADMIN_DEFAULT_PASSWORD: a
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - db

volumes:
  postgres_data:
  pgadmin-data:
