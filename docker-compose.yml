version: '3.8'

services:

  # 1. KHỐI DATABASE (POSTGRESQL + PGVECTOR)
  db:
    image: ankane/pgvector:v0.5.1
    container_name: attendance_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql

  # 2. KHỐI BACKEND (NODEJS / EXPRESS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendance_backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - default

volumes:
  postgres_data: